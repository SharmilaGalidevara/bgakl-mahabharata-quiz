<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BGAKL Mahabharata Quiz</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <div class="background-overlay"></div>

    <main class="container">

        <div class="quiz-card">

            <div class="logo">

                🦚

            </div>

            <h1>

                BGAKL

                <span>Mahabharata Quiz Challenge</span>

            </h1>

            <p class="subtitle">

                Practice exactly like the real competition.

            </p>

            <div class="input-group">

                <label for="playerName">

                    Enter Your Name

                </label>

                <input
                    type="text"
                    id="playerName"
                    placeholder="e.g. Sharmila">

            </div>

            <div class="info-box">

                <div class="info-item">

                    <span>Questions</span>

                    <strong>40 Random</strong>

                </div>

                <div class="info-item">

                    <span>Question Bank</span>

                    <strong>200 Questions</strong>

                </div>

                <div class="info-item">

                    <span>Time Limit</span>

                    <strong>1 Hour</strong>

                </div>

            </div>

            <div class="language-box">

                <h3>

                    Language

                </h3>

                <p>

                    🇬🇧 English + தமிழ்

                </p>

            </div>

            <button id="startBtn">

                START QUIZ

            </button>

            <div class="footer">

                <p>

                    🏆 Beat your fastest time and climb your personal leaderboard!

                </p>

            </div>

        </div>

    </main>

    <script src="js/app.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Quiz</title>

    <link rel="stylesheet"
          href="css/quiz.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="container">

<header>

<div>

<h2 id="playerName">

Player

</h2>

<p>

BGAKL Mahabharata Quiz

</p>

</div>

<div class="timer">

⏰

<span id="timer">

01:00:00

</span>

</div>

</header>

<section class="progress">

<div>

Question

<span id="questionNumber">

1

</span>

/40

</div>

</section>

<section class="question-card">

<h3 id="questionEnglish">

English Question

</h3>

<hr>

<h3 id="questionTamil">

Tamil Question

</h3>

</section>

<section
class="options"
id="optionsContainer">

<!-- Options generated by JS -->

</section>

<footer>

<button
id="previousBtn">

Previous

</button>

<button
id="nextBtn">

Next

</button>

</footer>

<div class="submit-section">

<button
id="submitBtn">

Submit Quiz

</button>

</div>

</div>

<script src="js/questions.js"></script>

<script src="js/quiz.js"></script>

</body>

</html>

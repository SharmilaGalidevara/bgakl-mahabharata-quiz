<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Mahabharata Quiz</title>

<link rel="stylesheet"
href="css/quiz.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="container">

<header>

<div>

<h2 id="playerName">

Player

</h2>

<p>

BGAKL Mahabharata Quiz

</p>

</div>

<div id="timer">

01:00:00

</div>

<div id="liveStats">
    <p>Answered: <span id="answeredCount">0</span>/40</p>
    <p>Accuracy: <span id="accuracy">100%</span></p>
</div>

</header>

<!-- Progress -->

<div class="progress-bar">

<div id="progressFill">

</div>

</div>

<!-- Question Counter -->

<div class="question-info">

<span id="questionCounter">

Question 1 / 40

</span>

</div>

<!-- Palette -->

<div id="questionPalette">

<!-- Generated automatically -->

</div>

<!-- Question -->

<div class="question-card">

<h2 id="questionEnglish">

Loading...

</h2>

<hr>

<h2 id="questionTamil">

Loading...

</h2>

</div>

<!-- Options -->

<div
id="optionsContainer"
class="options">

</div>

<!-- Navigation -->

<div class="navigation">

<button
id="previousBtn">

← Previous

</button>

<button
id="nextBtn">

Next →

</button>

</div>

<div class="submit-area">

<button
id="submitBtn">

Submit Quiz

</button>

</div>

</div>

<script src="js/utils.js"></script>

<script src="js/quiz.js"></script>

</body>

</html>
